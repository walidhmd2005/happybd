<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why You Are My Favorite Person 💖</title>
    <link rel="stylesheet" href="./cause.css">
</head>
<body>
    <div class="custom-cursor">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#ff4f9a" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
    </div>

    <main class="container">
        <section class="intro">
            <p class="eyebrow">Four little reasons</p>
            <h1>Happy Birthday Halima 💖</h1>
            <p>Tap through each note, then enter the memory lane I made for you.</p>
        </section>

        <div id="reasons-container"></div>

        <div class="controls">
            <button class="shuffle-button">Show Me One 💕</button>
            <div class="reason-counter"></div>
        </div>

        <section class="ending-section" aria-label="Birthday photo">
            <div class="teddy-hug">
                <img src="./d1.jpeg" alt="Halima smiling">
            </div>
            <div class="ending-text">You're the best girlfriend 💖</div>
        </section>
    </main>

    <script src="motion.js"></script>
    <script src="cause.js"></script>
</body>
</html>
